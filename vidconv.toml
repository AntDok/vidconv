# vidconv configuration
#
# Looked up in this order: ./vidconv.toml, the dir holding the vidconv script,
# then $XDG_CONFIG_HOME/vidconv/config.toml. Override with --config.
# Relative paths below resolve against the directory holding THIS file.

default_profile = "x265"

[paths]
# Where to look for files to convert. The tree below it is mirrored into
# output_dir: source_dir/Show/Season 1/ep.mkv -> output_dir/Show/Season 1/ep.mkv
source_dir = "./convert"

# Where converted files land. MUST NOT be the same directory as source_dir --
# vidconv refuses to start if it is. An output landing on top of its own source
# is unrecoverable, and it is not a hypothetical: ffmpeg declines to encode a file
# onto itself, which looks like a failed conversion, and the cleanup for a failed
# conversion deletes the output -- which would be the source.
#
# output_dir INSIDE source_dir (e.g. "./convert/converted") is allowed; the scan
# skips the output tree so finished files are not picked up as new sources.
output_dir = "./converted"

# Set true to dump every output directly in output_dir with no subdirectories.
# Sources with the same filename in different directories will collide.
flatten = false

[scan]
# Glob patterns matched against both the filename and the path relative to
# source_dir. A file must match at least one include and no excludes.
include = ["*.mkv"]
exclude = []

# Minimum path depth below source_dir, counted in components including the
# filename. 0 accepts everything; 2 requires at least one subdirectory.
min_depth = 0

[ffmpeg]
# Passed to nice(1). Omit or set to 0 for normal priority.
nice = 10

# Whether ffmpeg may clobber an EXISTING FILE IN output_dir. It never touches the
# source: this is ffmpeg's -y/-n, which applies only to the output.
#   false => -n. An already-converted output is left alone, so re-running vidconv
#            skips finished work instead of redoing it. The default, and the reason
#            the tool is safe to re-run.
#   true  => -y. Re-encode over existing outputs every time.
# `convert --redo` is the per-run override and is usually what you want.
overwrite_outputs = false

[convert]
# Check run after each encode. This is the one that costs you wall-clock time.
#   "probe"  - ffprobe reads the output and its duration matches the source.
#              Near-instant. The default.
#   "decode" - fully decode the output. Slow: adds roughly the decode time of
#              the file to every conversion.
#   "none"   - trust ffmpeg's exit code and move on. Fastest.
# Override per-run with `convert --verify none`.
#
# If a run deletes sources, this is automatically escalated to whatever
# delete.verify demands -- there is no way to delete a source without the
# stricter check having run. It runs exactly once, not twice.
verify = "probe"

[delete]
# What to do with a source file after its output verifies.
#   "ask"   - prompt before deleting (default)
#   "auto"  - delete without prompting, but still only after verification
#   "never" - keep sources; `vidconv clean` can remove them later
# Override per-run with `convert --delete auto`.
policy = "ask"

# How hard to check an output before allowing its source to be DELETED. This is
# the safety-critical one; it is not about speed.
#   "decode" - full decode of the output; catches truncation and corruption.
#              The only mode that catches the failures the old remove.sh ignored.
#   "probe"  - ffprobe reads it and the duration matches the source. Fast, and
#              blind to a truncated file that still claims full duration.
#   "none"   - floors at "probe" anyway. Deleting on no evidence at all is how
#              you lose files, so this setting cannot fully disable the check.
verify = "decode"


# --- profiles ---------------------------------------------------------------
# `args` sits between the input and the output on the ffmpeg command line:
#   ffmpeg -n -i <source> <args> <output>
# `suffix` is appended to the filename stem; `extension` sets the container.

# Matches the old convert.sh exactly: -map 0 -vcodec libx265 -crf 24
# x265 logs its own banner and stats straight to stderr and ignores ffmpeg's
# -loglevel, so log-level=error is what actually quiets it.
[profiles.x265]
args = "-map 0 -c:v libx265 -crf 24 -x265-params log-level=error -c:a copy -c:s copy"
extension = ".mkv"

# Smaller files, slower encode. Good for archival.
[profiles.x265-slow]
args = """-map 0 -c:v libx265 -crf 22 -preset slow -x265-params log-level=error \
-c:a copy -c:s copy"""
extension = ".mkv"

# NVIDIA hardware encode. Much faster, larger output at similar visual quality.
[profiles.nvenc]
args = "-map 0 -c:v hevc_nvenc -preset p5 -rc vbr -cq 26 -c:a copy -c:s copy"
extension = ".mkv"

# Intel/AMD hardware encode via VAAPI. Needs a working /dev/dri render node.
# Subtitles are dropped: the hwupload filter cannot carry them through.
[profiles.vaapi]
args = """-vaapi_device /dev/dri/renderD128 -vf format=nv12,hwupload \
-c:v hevc_vaapi -qp 26 -c:a copy"""
extension = ".mkv"

# Remux only: no re-encode. Useful for testing the pipeline end to end in
# seconds, since it just copies streams into a new container.
[profiles.copy]
args = "-map 0 -c copy"
extension = ".mkv"
